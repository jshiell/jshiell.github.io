<!DOCTYPE html>
<html>
    <head>
        <title>infernus</title>
        <style type="text/css">
        body {
            font-family: "Helvetica Neue", Helvetica, Verdana, Arial, Helvetica, sans-serif;
            font-size: 24px;
        }
        h1 {
            font-size: 48px;
            text-align: center;
            font-weight: normal;
            margin-bottom: 10px;
            color: #333;
        }
        h1 .separator {
            color: darkred;
        }
        .flat-list {
            list-style: none;
            text-align: center;
        }
        .flat-list li {
            display: inline;
        }
        .flat-list li + li:before {
            content: "\2022";
            padding: 0 10px;
        }
        </style>
    </head>
    <body>
        <h1>jsh<span class="separator">@</span>infernus</h1>
        <section id="content">
            <ul class="flat-list">
                <li><a href="mailto:www+infernus@infernus.org">email</a></li>
                <li><a href="https://github.com/jshiell/">github</a></li>
                <li><a href="https://twitter.com/jshiell/">twitter</a></li>
            </ul>
        </section>
    </body>
</html>
